        <p>Typesense UI is a modern, open-source visual dashboard for managing and exploring Typesense search engine collections. It features AI-powered natural language queries, real-time full-text search, dynamic filtering, and a beautiful dark mode interface.</p>
        <h2>Key Features</h2>
        <ul>
          <li><strong>Visual Collection Management</strong> — Browse all collections with live document counts and schema inspection</li>
          <li><strong>Full-Text Search</strong> — Sub-millisecond, typo-tolerant search across all text fields</li>
          <li><strong>AI-Powered Queries</strong> — Ask questions in plain English using Google Gemini integration</li>
          <li><strong>Document CRUD</strong> — Create, read, update, and delete documents with a built-in JSON editor</li>
          <li><strong>Schema Editor</strong> — Visual schema creation and migration tools</li>
          <li><strong>Search Analytics</strong> — Track top queries, zero-result searches, and latency metrics</li>
          <li><strong>Zero-Install CLI</strong> — Run <code>npx typesense-ui</code> to start instantly</li>
          <li><strong>Dark Mode</strong> — Beautiful dark and light themes</li>
          <li><strong>Fully Responsive</strong> — Works on desktop, tablet, and mobile</li>
        </ul>
        <h2>Quick Start</h2>
        <p>Run <code>npx typesense-ui</code> in your terminal to launch the dashboard. No installation required.</p>
